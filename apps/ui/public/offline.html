<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terra.OS — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      text-align: center;
      max-width: 400px;
      padding: 2.5rem 2rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #00ff88;
      color: #0a0f1a;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #00e67a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Brak połączenia</h1>
    <p>Terra.OS wymaga połączenia z internetem. Sprawdź połączenie i spróbuj ponownie.</p>
    <button onclick="window.location.reload()">Spróbuj ponownie</button>
  </div>
</body>
</html>
